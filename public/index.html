<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🎰 Card Slot Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <div class="game-container">

    <header>🎰 Card Slot Game</header>

    <!-- ✅ Top bar -->
    <div style="display:flex; justify-content:space-between; align-items:center;">
      <div id="balance">Balance: $0</div>
      <button id="logout-btn">Logout</button>
      <button onclick="addBalance()">+10K Dev</button>
    </div>

    <!-- Slot Machine -->
    <div class="slot-section">
      <div id="slot-reels">❓ ❓ ❓</div>
      <button class="btn btn-spin" id="spin-btn">Spin (100)</button>
      <button class="btn" onclick="autoSpin()">Auto Spin</button>
    </div>

    <!-- Crates -->
    <div class="crate-container">
      <button class="btn btn-crate" data-crate="basic">Basic</button>
      <button class="btn btn-crate" data-crate="premium">Premium</button>
      <button class="btn btn-crate" data-crate="elite">Elite</button>
    </div>

    <!-- Result -->
    <h2>Result</h2>
    <div id="result"></div>

    <!-- Deck -->
    <h2>Deck</h2>
    <div id="deck"></div>

    <!-- Inventory -->
    <h2>Inventory</h2>
    <div id="inventory"></div>

  </div>
<div style="margin-top:20px;">
  <button onclick="addBalance()">+10K 💰</button>
  <button onclick="resetAccount()">Reset 🔄</button>
  <button onclick="devCard('mythic_multiplier','legendary')">+Legendary</button>
</div>
  <script src="app.js" defer></script>
</body>
</html>
