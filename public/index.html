<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🎰 Arcade Slot</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="game-container">

    <header>🎰 ARCADE SLOT</header>

    <!-- TOP BAR -->
    <div class="top-bar">
      <div id="login-streak">Login Streak: 1</div>
      <div class="left-ui">
        <div class="xp-container">
          <div class="xp-top">
            <span id="level">Lv. 1</span>
            <span id="xp-text">0 / 100</span>
          </div>
          <div class="xp-bar">
            <div id="xp-fill"></div>
          </div>
        </div>
      </div>

      <div class="right-ui">
        <button id="spin-btn" class="btn btn-spin">SPIN</button>
        <button id="auto-spin-btn" class="btn">AUTO</button>
        <button id="store-btn" class="btn">STORE</button>
        <button id="logout-btn" class="btn btn-danger">LOGOUT</button>
      </div>
    </div>

    <!-- 🎰 SLOT MACHINE -->
   <div class="slot-section">

    <!-- LEFT SIDE (Deck / Event / Streak) -->
    <div class="slot-side slot-left">
      
      <div class="ui-block">
        <div class="ui-label">Deck Effects</div>
        <div id="deck-effects">None</div>
      </div>

      <div class="ui-block">
        <div class="ui-label">Event</div>
        <div id="event-display">None</div>
      </div>

      <div class="ui-block">
        <div class="ui-label">Streak</div>
        <div id="streak-display">x1</div>
      </div>

    </div>

    <!-- CENTER (Slot Machine) -->
    <div id="slot-reels-container">

      <div class="slot-header">
        <div id="balance" class="slot-balance">$0</div>
      </div>

      <div id="slot-reels">
        <span id="r1">❓</span>
        <span id="r2">❓</span>
        <span id="r3">❓</span>
        <span id="r4">❓</span>
        <span id="r5">❓</span>
      </div>

      <!-- RESULT (payout only) -->
      <div id="result"></div>

    </div>

    <!-- RIGHT SIDE (Multiplier + Luck) -->
    <div class="slot-side slot-right">

      <div class="multiplier-main" id="multiplier">x1.0</div>

      <div class="multiplier-sub" id="luck-mult">🍀 x1.0</div>

    </div>

  </div>

    <!-- 🛒 STORE PANEL (NOW HOLDS CRATES) -->
    <div id="store-panel" class="hidden">

      <h2>Shop</h2>

      <div class="shop-section">
        <h3>Crates</h3>
        <button class="btn btn-crate" data-crate="basic">Basic</button>
        <button class="btn btn-crate" data-crate="premium">Premium</button>
        <button class="btn btn-crate" data-crate="elite">Elite</button>
      </div>

      <div class="shop-section">
        <h3>Upgrades</h3>

        <button id="upgrade-payout-btn">
          Payout (<span id="payout-boost-text">x1.0</span>)
        </button>

        <button id="upgrade-xp-btn">
          XP (<span id="xp-boost-text">x1.0</span>)
        </button>
      </div>

    </div>

    <!-- 🃏 DECK (COLLAPSIBLE) -->
    <div class="panel">
      <div class="panel-header" onclick="togglePanel('deck-panel')">
        Deck ▼
      </div>

      <div id="deck-panel" class="panel-body">
        <div id="deck"></div>
      </div>
    </div>

    <!-- 🎒 INVENTORY (COLLAPSIBLE) -->
    <div class="panel">
      <div class="panel-header" onclick="togglePanel('inventory-panel')">
        Inventory ▼
      </div>

      <div id="inventory-panel" class="panel-body">
        <div id="inventory"></div>
      </div>
    </div>

    <!-- 🛠 DEV TOOLS -->
    <div class="dev-tools">
      <button id="dev-add-balance">+10K</button>
      <button id="dev-reset-deck">Reset Deck</button>
      <button id="dev-clear-inventory">Reset All</button>
      <button onclick="devCard('mythic_multiplier','legendary')">
        +Legendary
      </button>
    </div>

  </div>

  <script src="app.js" defer></script>

</body>
</html>
